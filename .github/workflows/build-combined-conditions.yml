name: Build Combined Fishing Conditions

on:
  workflow_dispatch:
  schedule:
    - cron: "30 12 * * *"  # daily at 12:30 UTC

permissions:
  contents: write

concurrency:
  group: build-combined-conditions
  cancel-in-progress: false

jobs:
  build-combined-conditions:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install httpx

      - name: Sync with latest main
        run: |
          git pull --ff-only origin main

      - name: Build combined conditions JSON
        env:
          PYTHONPATH: src 
        run: |
          python combined_conditions.py

      - name: Build LLM context
        env:
          PYTHONPATH: src 
        run: |
          python build_llm_context.py

      - name: Commit generated data artifacts
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add data/

          if git diff --cached --quiet; then
            echo "No generated data changes to commit"
          else
            git commit -m "Update combined fishing data artifacts"
            git push
          fi
