name: Update USGS River Conditions
run-name: Update USGS River Conditions

on:
  push:
    branches:
      - main

  workflow_dispatch:

  schedule:
    - cron: "0 12 * * *"

permissions:
  contents: write

concurrency:
  group: update-usgs-conditions
  cancel-in-progress: true

jobs:
  update-usgs:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync with latest main
        run: |
          git fetch origin main
          git reset --hard origin/main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run live conditions job
        env:
          PYTHONPATH: src
        run: |
          python -m troutintel.jobs.update_live_conditions

      - name: Commit updated river conditions
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add site_snippets/
          git add data/usgs/

          if git diff --cached --quiet; then
            echo "No river condition changes"
          else
            git commit -m "Update USGS river conditions"
            git push origin main
          fi
