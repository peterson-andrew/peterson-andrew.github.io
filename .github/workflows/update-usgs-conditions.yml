name: Update USGS River Conditions
run-name: Update USGS River Conditions


on:
  workflow_dispatch:
  schedule:
    - cron: "0 12 * * *"  # runs daily at 12:00 UTC

permissions:
  contents: write

concurrency:
  group: update-usgs-conditions
  cancel-in-progress: false

jobs:
  update-usgs:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4


      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install httpx

      - name: Run live conditions job
        env:
          PYTHONPATH: src
        run: |
          python -m troutintel.jobs.update_live_conditions

      
      - name: Commit updated river conditions
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git pull --ff-only origin main

          git add site_snippets/

          if git diff --cached --quiet; then
            echo "No river condition changes to commit"
          else
            git commit -m "Update USGS river conditions"
            git push
          fi
