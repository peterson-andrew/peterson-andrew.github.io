name: Update NOAA Forecast

on:
  push:
    branches:
      - main

  workflow_dispatch:

  schedule:
    - cron: "5 1 * * *"

permissions:
  contents: write

concurrency:
  group: update-noaa-forecast
  cancel-in-progress: false

jobs:
  update-noaa-forecast:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run NOAA weather job
        env:
          PYTHONPATH: src
        run: |
          python -m troutintel.jobs.update_weather

      - name: Commit weather updates
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add data/weather/

          if git diff --cached --quiet; then
            echo "No weather changes"
          else
            git commit -m "Update NOAA weather data"
            git pull --rebase origin main
            git push
          fi
